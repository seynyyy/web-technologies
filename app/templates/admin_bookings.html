{% extends "base.html" %}

{% block title %}Бронювання - Адмін панель{% endblock %}

{% block content %}
<div class="hero-shell mb-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3">
        <div>
            <a href="/admin" class="btn btn-sm btn-outline-secondary mb-2"><i class="fas fa-arrow-left"></i> Назад</a>
            <h2 class="fw-semibold">Бронювання</h2>
            <p class="text-muted mb-0">Перегляд та управління всіма бронюваннями.</p>
        </div>
        <div class="d-flex gap-2 flex-wrap align-items-center">
            <input type="date" id="filter-date" class="form-control" style="max-width: 150px;" />
            <select id="filter-machine" class="form-select" style="max-width: 200px;">
                <option value="">Всі машини</option>
            </select>
            <button class="btn btn-outline-secondary" id="refresh-btn"><i class="fas fa-sync"></i> Оновити</button>
        </div>
    </div>
</div>

<div class="card shadow-sm border-0">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Користувач</th>
                        <th>Пральна машина</th>
                        <th>Дата</th>
                        <th>Час</th>
                        <th>Створено</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody id="bookings-table"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="delete-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Видалити бронювання</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                Ви впевнені, що хочете видалити це бронювання?
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Скасувати</button>
                <button type="button" class="btn btn-danger" id="confirm-delete-btn">Видалити</button>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/admin_bookings.js') }}"></script>
{% endblock %}
