services:
  db:
    image: postgres:15
    container_name: laundry_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: laundry_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d laundry_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: laundry_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db/laundry_db
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=laundry_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: